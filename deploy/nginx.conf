# s3vyaPOS nginx vhost — copy to /etc/nginx/sites-available/s3vyapos
# then: ln -s ../sites-available/s3vyapos /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
# TLS: certbot --nginx -d pos.YOURDOMAIN.com
#
# Does NOT touch the existing sites — uses its own server_name + upstreams.

server {
    listen 80;
    server_name pos.YOURDOMAIN.com;

    # API → NestJS on :5300 (keeps the /api prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:5300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js on :3300
    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
